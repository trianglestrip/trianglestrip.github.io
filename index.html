<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>我的在线文档</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="我的在线文档">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
</head>
<body>
  <div id="app">加载中...</div>
  <script>
    window.$docsify = {
      name: '我的在线文档',
      repo: 'https://github.com/trianglestrip/trianglestrip.github.io',
      homepage: 'docs/index.md',
      loadSidebar: true,
      subMaxLevel: 2,
      auto2top: true,
      alias: {
        '/.*/_sidebar.md': '/docs/_sidebar.md',
      },
      search: {
        placeholder: '搜索',
        noData: '没有结果',
        paths: 'auto',
      },
    };
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
</body>
</html>
