name: 自动发布博客
on:
  push:
    branches: [ master ]
    paths-ignore:
      - 'live/server/**'
      - 'live/web/**'
      - 'live/build/**'
      - 'news/**'
  discussion:
    types: [created, edited, deleted, transferred, labeled, unlabeled]
  workflow_dispatch:
permissions:
  contents: write
  discussions: read
jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: latest
          extended: true
      - name: 安装主题并构建
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          DISCUSSIONS_CATEGORY: 博客
        run: |
          git clone --depth 1 https://github.com/dillonzq/LoveIt.git themes/LoveIt
          python3 scripts/prepare-posts.py
          python3 scripts/sync-discussions.py
          hugo --minify --contentDir .hugo-prepared/content
      - name: 合并热榜静态页（news 独立模块，仅拷贝发布产物）
        run: |
          mkdir -p public/news
          cp news/index.html news/icons-sprite.png news/icons-sprite-dock.png public/news/
      - name: 合并直播前端（live/dist/web → /live/）
        run: |
          mkdir -p public/live
          cp -r live/dist/web/* public/live/
          cp public/live/index.html public/live/404.html
      - name: GitHub Pages 404（/live/* 深链回退到 SPA）
        run: |
          cat > public/404.html << 'EOF'
          <!DOCTYPE html>
          <html lang="zh-CN">
          <head>
            <meta charset="UTF-8">
            <title>404</title>
            <script>
            (function () {
              var path = location.pathname;
              if (path.startsWith("/live")) {
                var rest = path.replace(/^\/live/, "") || "/";
                if (!/\.[a-z0-9]+$/i.test(rest)) {
                  sessionStorage.setItem("live-gh-pages-path", rest + location.search + location.hash);
                  location.replace("/live/");
                  return;
                }
              }
              location.replace("/");
            })();
            </script>
          </head>
          <body></body>
          </html>
          EOF
      - name: 部署到 gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          force_orphan: true
