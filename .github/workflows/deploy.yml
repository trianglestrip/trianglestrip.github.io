name: 自动发布博客
on:
  push:
    branches: [ master ]
permissions:
  contents: write
jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - uses: actions/hugo-setup@v2
        with:
          hugo-version: latest
          extended: false
      - name: 安装主题并构建
        run: |
          hugo mod get
          hugo --minify
      - name: 部署到 gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          force_orphan: true
