name: 自动发布文档
on:
  push:
    branches: [ master ]
permissions:
  contents: write
jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 准备发布文件
        run: |
          mkdir -p _site
          cp index.html _site/
          cp -r assets _site/assets
          cp docs/*.md _site/
          touch _site/.nojekyll
      - name: 部署到 gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          force_orphan: true
