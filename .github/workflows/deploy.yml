name: 自动发布博客
on:
  push:
    branches: [ master ]
permissions:
  contents: write
jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: 准备发布文件
        run: |
          mkdir -p _site
          cp index.html _site/
          cp -r assets _site/assets
          cp assets/favicon.ico _site/favicon.ico
          cp docs/*.md _site/
          cp -r docs/posts _site/posts
          python3 scripts/generate-posts.py _site/posts.json
          touch _site/.nojekyll
      - name: 部署到 gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          force_orphan: true
