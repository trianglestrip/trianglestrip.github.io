name: 自动构建博客

on:
  push:
    branches:
      - master
    paths:
      - 'posts/**/*.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 检出 master 分支（静态网站）
        uses: actions/checkout@v4
        with:
          ref: master
          path: master

      - name: 📥 检出 blog-source 分支（Hugo 源文件）
        uses: actions/checkout@v4
        with:
          ref: blog-source
          path: blog-source

      - name: 🔧 设置 Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: 'latest'
          extended: true

      - name: 📝 复制新文章到 Hugo 源目录
        run: |
          echo "检查 master 分支的 posts 目录..."
          if [ -d "master/posts" ] && [ "$(ls -A master/posts/*.md 2>/dev/null)" ]; then
            echo "✅ 发现新文章，开始复制..."
            mkdir -p blog-source/content/posts
            
            for file in master/posts/*.md; do
              if [ -f "$file" ]; then
                filename=$(basename "$file")
                echo "复制: $filename"
                cp "$file" "blog-source/content/posts/$filename"
              fi
            done
            
            echo "📊 文章列表:"
            ls -lh blog-source/content/posts/*.md
          else
            echo "⚠️ 没有发现新文章"
            exit 0
          fi

      - name: 🏗️ 使用 Hugo 构建网站
        working-directory: ./blog-source
        run: |
          echo "开始构建..."
          hugo --minify
          echo "✅ 构建完成"
          ls -lh public/

      - name: 🚀 部署到 master 分支
        run: |
          cd master
          
          # 配置 Git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # 删除旧的 HTML 文件（保留 posts 目录和配置文件）
          echo "清理旧文件..."
          find . -maxdepth 1 -type f -name "*.html" -delete
          find . -maxdepth 1 -type f -name "*.xml" -delete
          find . -maxdepth 1 -type f -name "*.json" -delete
          rm -rf css js lib images svg categories tags about first page pages 2>/dev/null || true
          
          # 复制新构建的文件
          echo "复制新文件..."
          cp -r ../blog-source/public/* .
          
          # 提交更改
          git add .
          if git diff --staged --quiet; then
            echo "没有变更需要提交"
          else
            git commit -m "🤖 自动构建: 更新博客内容

通过 GitHub Actions 自动构建
- 来源: blog-source 分支
- 新文章: $(ls -1 posts/*.md 2>/dev/null | wc -l) 篇
- 构建时间: $(date '+%Y-%m-%d %H:%M:%S')"
            
            git push origin master
            echo "✅ 部署完成！"
          fi

      - name: 📊 构建摘要
        if: always()
        run: |
          echo "### 📊 构建摘要" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- 🌐 网站地址: https://trianglestrip.github.io" >> $GITHUB_STEP_SUMMARY
          echo "- 📝 文章数量: $(ls -1 master/posts/*.md 2>/dev/null | wc -l)" >> $GITHUB_STEP_SUMMARY
          echo "- ⏰ 构建时间: $(date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ 状态: 构建完成" >> $GITHUB_STEP_SUMMARY
