{{- $comment := .Params.comment | default dict -}}
{{- if not $comment.enable -}}{{- return -}}{{- end -}}
{{- $utterances := .Site.Params.page.comment.utterances | default dict -}}
{{- if not $utterances.enable -}}{{- return -}}{{- end -}}
<div id="utterances-config" hidden
  data-repo="{{ $utterances.repo }}"
  data-issue-term="{{ $utterances.issueTerm | default "pathname" }}"
  data-label="{{ $utterances.label | default "" }}"
  data-light-theme="{{ $utterances.lightTheme | default "github-light" }}"
  data-dark-theme="{{ $utterances.darkTheme | default "github-dark" }}"></div>
<script>
(function () {
  var cfgEl = document.getElementById('utterances-config');
  if (!cfgEl) return;

  function bootUtterances() {
    var el = document.getElementById('utterances');
    if (!el || el.dataset.ready) return;
    el.dataset.ready = '1';
    var isDark = document.body.getAttribute('theme') === 'dark';
    var script = document.createElement('script');
    script.src = 'https://utteranc.es/client.js';
    script.async = true;
    script.crossOrigin = 'anonymous';
    script.setAttribute('repo', cfgEl.dataset.repo);
    script.setAttribute('issue-term', cfgEl.dataset.issueTerm);
    if (cfgEl.dataset.label) script.setAttribute('label', cfgEl.dataset.label);
    script.setAttribute('theme', isDark ? cfgEl.dataset.darkTheme : cfgEl.dataset.lightTheme);
    el.appendChild(script);
  }

  bootUtterances();
})();
</script>
