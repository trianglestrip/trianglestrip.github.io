{{ define "main" }}
<div class="home">
    <h1>欢迎来到 {{ .Site.Title }}</h1>
    <p>{{ .Site.Params.description }}</p>
    
    <h2>最新文章</h2>
    {{ range first 10 (where .Site.RegularPages "Type" "posts") }}
    <article>
        <h3><a href="{{ .RelPermalink }}">{{ .Title }}</a></h3>
        <time>{{ .Date.Format "2006-01-02" }}</time>
        <p>{{ .Summary }}</p>
    </article>
    {{ end }}
</div>
{{ end }}
