<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="referrer" content="no-referrer">
  <title>直播播放</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://cdn.jsdelivr.net/npm/flv.js@1.6.2/dist/flv.min.js"></script>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="brand">
        <div class="brand-icon">L</div>
        <div>
          <h1>直播播放</h1>
          <p>streamget 纯解析 + muxia 对比（浏览器直连 douyucdn）</p>
        </div>
      </div>
      <span class="badge">blog / live</span>
    </header>

    <div class="tabs" id="siteTabs"></div>

    <section class="card">
      <div class="controls">
        <input id="room" type="text" value="5720533" placeholder="房间号或平台链接">
        <select id="source" title="解析源">
          <option value="local" selected>streamget（本机）</option>
          <option value="muxia">muxia（对照）</option>
        </select>
        <button id="playBtn" class="primary">播放</button>
        <button id="compareBtn">对比 muxia</button>
        <button id="stopBtn">停止</button>
      </div>
      <div class="selectors">
        <select id="quality" title="清晰度"></select>
        <select id="line" title="线路"></select>
      </div>
    </section>

    <section class="card player-card">
      <div class="player-shell">
        <video id="player" controls playsinline></video>
      </div>
      <div class="room-meta">
        <img id="roomCover" class="cover" alt="" style="display:none">
        <div>
          <h2 id="roomTitle">等待播放</h2>
          <p id="roomAnchor"></p>
          <span id="liveBadge" class="badge">未开播</span>
        </div>
      </div>
      <div id="status" class="status">输入房间号后点击播放</div>
    </section>

    <section class="card compare-card" id="compareCard" hidden>
      <h3 class="compare-title">streamget vs muxia</h3>
      <p id="compareSummary" class="compare-summary"></p>
      <div class="compare-table-wrap">
        <table class="compare-table" id="compareTable">
          <thead>
            <tr>
              <th>档位</th>
              <th>线路（本机 / muxia）</th>
              <th>FLV 文件名</th>
              <th>结果</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </div>

  <script src="/static/app.js?v=10"></script>
</body>
</html>
