<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="referrer" content="no-referrer">
  <title>直播播放</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://cdn.jsdelivr.net/npm/flv.js@1.6.2/dist/flv.min.js"></script>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="brand">
        <div class="brand-icon">L</div>
        <div>
          <h1>直播播放</h1>
          <p>默认 muxia 高清 + 本机代理 live 播放</p>
        </div>
      </div>
      <span class="badge">blog / live</span>
    </header>

    <div class="tabs" id="siteTabs"></div>

    <section class="card">
      <div class="controls">
        <input id="room" type="text" value="9999" placeholder="房间号或平台链接">
        <select id="source" title="解析源">
          <option value="local">streamget（本机）</option>
          <option value="muxia" selected>muxia（lemon-live）</option>
        </select>
        <select id="proxyMode" title="播放方式">
          <option value="proxy" selected>代理播放</option>
          <option value="direct">直连 CDN</option>
        </select>
        <button id="playBtn" class="primary">播放</button>
        <button id="stopBtn">停止</button>
      </div>
      <div class="selectors">
        <select id="quality" title="清晰度"></select>
        <select id="line" title="线路"></select>
      </div>
    </section>

    <section class="card player-card">
      <div class="player-shell">
        <video id="player" controls playsinline></video>
      </div>
      <div class="room-meta">
        <img id="roomCover" class="cover" alt="" style="display:none">
        <div>
          <h2 id="roomTitle">等待播放</h2>
          <p id="roomAnchor"></p>
          <span id="liveBadge" class="badge">未开播</span>
        </div>
      </div>
      <div id="status" class="status">输入房间号后点击播放</div>
    </section>
  </div>

  <script src="/static/app.js?v=8"></script>
</body>
</html>
