baseURL = "https://trianglestrip.github.io/"
languageCode = "zh-cn"
title = "我的博客"
theme = "PaperMod"
pagination.pagerSize = 10

[module]
  [[module.imports]]
    path = "github.com/adityatelange/hugo-PaperMod"

[params]
  env = "production"
  description = "记录想法、代码和日常"
  author = "trianglestrip"
  defaultTheme = "light"
  ShowReadingTime = true
  ShowPostNavLinks = true
  ShowCodeCopyButtons = true
  ShowBreadCrumbs = false
  homeInfoParams.Title = "我的博客"
  homeInfoParams.Content = "记录想法、代码和日常。"

[menu]
  [[menu.main]]
    identifier = "home"
    name = "首页"
    url = "/"
    weight = 10
  [[menu.main]]
    identifier = "about"
    name = "关于"
    url = "/about/"
    weight = 20

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup.goldmark.renderer]
  unsafe = true
